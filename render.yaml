services:
  - type: web
    name: claim-management-system
    env: node
    plan: free
    buildCommand: npm install && npm run install:all && npm run build:frontend
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        value: "claim-management-app-production-secret-key-987654321"
